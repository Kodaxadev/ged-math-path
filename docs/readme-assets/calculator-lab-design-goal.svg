<text x="1072" y="278" fill="#20D5CD" font-family="Arial" font-size="10" font-weight="700" letter-spacing="2">GUIDED STEP</text><text x="1072" y="322" fill="#F1F6FF" font-family="Arial" font-size="28" font-weight="700">Press the highlighted key.</text><text x="1072" y="354" fill="#9FB2CC" font-family="Arial" font-size="15">One button at a time. Wrong keys do not erase your work.</text>
