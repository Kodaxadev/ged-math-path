<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
<defs><linearGradient id="bg" x2="1600" y2="900"><stop stop-color="#07111F"/><stop offset="1" stop-color="#040912"/></linearGradient><linearGradient id="card" x2="1" y2="1"><stop stop-color="#102034"/><stop offset="1" stop-color="#091322"/></linearGradient><linearGradient id="calcBody" x2="1" y2="1"><stop stop-color="#F5F7F8"/><stop offset=".5" stop-color="#D5DCE2"/><stop offset="1" stop-color="#EEF2F4"/></linearGradient><linearGradient id="keys" x2="1" y2="1"><stop stop-color="#25475E"/><stop offset="1" stop-color="#162E41"/></linearGradient><linearGradient id="cta"><stop stop-color="#2BDFD6"/><stop offset="1" stop-color="#1EA6C6"/></linearGradient><filter id="shadow"><feDropShadow dy="22" stdDeviation="29" flood-opacity=".35"/></filter></defs>
<rect width="1600" height="900" rx="32" fill="url(#bg)"/>
<text x="78" y="78" fill="#20D5CD" font-family="Arial" font-size="15" font-weight="700" letter-spacing="4">CALCULATOR LAB • DESIGN TARGET</text>
<text x="78" y="138" fill="#EFF6FF" font-family="Arial" font-size="47" font-weight="700">Learn the buttons from zero.</text>
<text x="78" y="176" fill="#9DB0CB" font-family="Arial" font-size="18">Write the setup. Press one highlighted key. Check the display. Repeat.</text>
