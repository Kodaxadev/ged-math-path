<text x="122" y="491" fill="#AABDD5" font-family="Arial" font-size="14">The result button</text><text x="122" y="532" fill="#AABDD5" font-family="Arial" font-size="14">Decimals for money</text><text x="122" y="573" fill="#AABDD5" font-family="Arial" font-size="14">Fractions using ÷</text><text x="122" y="614" fill="#AABDD5" font-family="Arial" font-size="14">Square root</text><text x="122" y="655" fill="#AABDD5" font-family="Arial" font-size="14">Formula sheet → calculator</text>
<rect x="104" y="692" width="329" height="93" rx="13" fill="#081422" stroke="#1F3852"/><text x="124" y="718" fill="#20D5CD" font-family="Arial" font-size="9" font-weight="700" letter-spacing="2">WRITE FIRST</text><text x="124" y="755" fill="#F1F6FF" font-family="Arial" font-size="27" font-weight="700">6² + 3²</text></g>
